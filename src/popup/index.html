<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fillix</title>
    <style>
      body {
        font:
          13px system-ui,
          sans-serif;
        width: 320px;
        padding: 12px;
        margin: 0;
      }
      fieldset {
        border: 1px solid #ddd;
        border-radius: 6px;
        margin: 0 0 12px;
        padding: 8px 10px;
      }
      legend {
        font-weight: 600;
      }
      label {
        display: block;
        margin: 6px 0 2px;
        font-size: 12px;
        color: #555;
      }
      input,
      select {
        width: 100%;
        padding: 6px;
        font: inherit;
        box-sizing: border-box;
      }
      button {
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .status {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <fieldset>
      <legend>Ollama</legend>
      <label>Base URL <input id="baseUrl" /></label>
      <div class="row">
        <label style="flex: 1"
          >Model
          <select id="model"></select
        ></label>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </fieldset>
    <fieldset id="obsidian-fieldset">
      <legend>Obsidian</legend>
      <label>Host <input id="obsidian-host" value="localhost" /></label>
      <label
        >Port <input id="obsidian-port" type="number" min="1" max="65535" value="27123"
      /></label>
      <label>API Key <input id="obsidian-api-key" type="password" /></label>
      <div class="row">
        <button id="obsidian-test" type="button">Test connection</button>
        <span id="obsidian-status" class="status"></span>
      </div>
      <label>
        System prompt path
        <div class="row">
          <input id="obsidian-system-prompt-path" list="vault-files" style="flex: 1" />
          <button id="obsidian-browse-system-prompt" type="button">Browse</button>
        </div>
      </label>
      <datalist id="vault-files"></datalist>
    </fieldset>
    <fieldset>
      <legend>Agent</legend>
      <label>Workflows folder <input id="workflows-folder" placeholder="fillix-workflows" /></label>
    </fieldset>
    <button id="save" type="button">Save</button>
    <div class="status" id="status"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
