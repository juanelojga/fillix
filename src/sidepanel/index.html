<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fillix Chat</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #fff;
        color: #111;
      }

      header {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px;
        border-bottom: 1px solid #e5e5e5;
        flex-shrink: 0;
      }

      .tab-btn {
        padding: 4px 10px;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        color: #555;
      }

      .tab-btn.active {
        background: #f0f0f0;
        color: #111;
        border-color: #ddd;
      }

      #new-conversation {
        margin-left: auto;
        padding: 4px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 12px;
        color: #555;
      }

      #new-conversation:hover {
        background: #f5f5f5;
      }

      /* ── Chat view ───────────────────────────────────────── */

      #chat-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 8px;
        line-height: 1.5;
        word-break: break-word;
      }

      .message.user {
        align-self: flex-end;
        background: #0070f3;
        color: #fff;
        white-space: pre-wrap;
      }

      .message.assistant {
        align-self: flex-start;
        background: #f4f4f4;
        color: #111;
      }

      .message.assistant.error {
        background: #fff0f0;
        color: #c00;
        font-size: 13px;
      }

      /* Markdown rendering inside assistant bubbles */
      .message.assistant p {
        margin-bottom: 0.6em;
      }
      .message.assistant p:last-child {
        margin-bottom: 0;
      }
      .message.assistant pre {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 6px 0;
      }
      .message.assistant code {
        font-family: monospace;
        font-size: 12px;
      }
      .message.assistant pre code {
        background: none;
        padding: 0;
      }
      .message.assistant :not(pre) > code {
        background: #eee;
        padding: 1px 4px;
        border-radius: 3px;
      }
      .message.assistant ul,
      .message.assistant ol {
        padding-left: 1.4em;
        margin: 4px 0;
      }
      .message.assistant li {
        margin-bottom: 2px;
      }
      .message.assistant strong {
        font-weight: 600;
      }

      #input-row {
        display: flex;
        gap: 6px;
        padding: 8px;
        border-top: 1px solid #e5e5e5;
        flex-shrink: 0;
        align-items: flex-end;
      }

      #input {
        flex: 1;
        resize: none;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        font-family: inherit;
        line-height: 1.4;
        max-height: 120px;
        overflow-y: auto;
        outline: none;
      }

      #input:focus {
        border-color: #0070f3;
      }

      #send,
      #stop {
        padding: 7px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      #send {
        background: #0070f3;
        color: #fff;
      }

      #send:disabled {
        background: #999;
        cursor: default;
      }

      #stop {
        background: #e00;
        color: #fff;
      }

      /* ── Settings view ───────────────────────────────────── */

      #settings-view {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-group label {
        font-size: 12px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .field-group input,
      .field-group select,
      .field-group textarea {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        width: 100%;
      }

      .field-group input:focus,
      .field-group select:focus,
      .field-group textarea:focus {
        border-color: #0070f3;
      }

      .field-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .model-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .model-row select {
        flex: 1;
      }

      #refreshModels {
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      #saveSettings {
        padding: 8px 14px;
        background: #0070f3;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        align-self: flex-start;
      }

      #settings-status {
        font-size: 12px;
        color: #080;
        min-height: 16px;
      }

      #localhost-warning {
        font-size: 12px;
        color: #b60;
        background: #fffbe6;
        border: 1px solid #ffe066;
        border-radius: 4px;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <button id="chat-tab" class="tab-btn active">Chat</button>
      <button id="settings-tab" class="tab-btn">Settings</button>
      <button id="new-conversation">New conversation</button>
    </header>

    <div id="chat-view">
      <div id="messages"></div>
      <div id="input-row">
        <textarea id="input" rows="1" placeholder="Message…"></textarea>
        <button id="send">Send</button>
        <button id="stop" hidden>Stop</button>
      </div>
    </div>

    <div id="settings-view" hidden>
      <div class="field-group">
        <label for="baseUrl">Ollama base URL</label>
        <input id="baseUrl" type="url" placeholder="http://localhost:11434" />
      </div>

      <div class="field-group">
        <label>Model</label>
        <div class="model-row">
          <select id="model"></select>
          <button id="refreshModels">Refresh</button>
        </div>
      </div>

      <div class="field-group">
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt"></textarea>
      </div>

      <button id="saveSettings">Save settings</button>
      <div id="settings-status"></div>
      <div id="localhost-warning" hidden>
        Warning: base URL is not localhost. All Ollama traffic will leave this machine.
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
