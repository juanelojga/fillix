<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fillix Chat</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      [hidden] {
        display: none !important;
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #fff;
        color: #111;
      }

      header {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px;
        border-bottom: 1px solid #e5e5e5;
        flex-shrink: 0;
      }

      .tab-btn {
        padding: 4px 10px;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        color: #555;
      }

      .tab-btn.active {
        background: #f0f0f0;
        color: #111;
        border-color: #ddd;
      }

      #new-conversation {
        margin-left: auto;
        padding: 4px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 12px;
        color: #555;
      }

      #new-conversation:hover {
        background: #f5f5f5;
      }

      /* ── Chat view ───────────────────────────────────────── */

      #chat-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 8px;
        line-height: 1.5;
        word-break: break-word;
      }

      .message.user {
        align-self: flex-end;
        background: #0070f3;
        color: #fff;
        white-space: pre-wrap;
      }

      .message.assistant {
        align-self: flex-start;
        background: #f4f4f4;
        color: #111;
      }

      .message.assistant.error {
        background: #fff0f0;
        color: #c00;
        font-size: 13px;
      }

      /* Markdown rendering inside assistant bubbles */
      .message.assistant p {
        margin-bottom: 0.6em;
      }
      .message.assistant p:last-child {
        margin-bottom: 0;
      }
      .message.assistant pre {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        margin: 6px 0;
      }
      .message.assistant code {
        font-family: monospace;
        font-size: 12px;
      }
      .message.assistant pre code {
        background: none;
        padding: 0;
      }
      .message.assistant :not(pre) > code {
        background: #eee;
        padding: 1px 4px;
        border-radius: 3px;
      }
      .message.assistant ul,
      .message.assistant ol {
        padding-left: 1.4em;
        margin: 4px 0;
      }
      .message.assistant li {
        margin-bottom: 2px;
      }
      .message.assistant strong {
        font-weight: 600;
      }

      #input-row {
        display: flex;
        gap: 6px;
        padding: 8px;
        border-top: 1px solid #e5e5e5;
        flex-shrink: 0;
        align-items: flex-end;
      }

      #input {
        flex: 1;
        resize: none;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        font-family: inherit;
        line-height: 1.4;
        max-height: 120px;
        overflow-y: auto;
        outline: none;
      }

      #input:focus {
        border-color: #0070f3;
      }

      #send,
      #stop {
        padding: 7px 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      #send {
        background: #0070f3;
        color: #fff;
      }

      #send:disabled {
        background: #999;
        cursor: default;
      }

      #stop {
        background: #e00;
        color: #fff;
      }

      /* ── Settings view ───────────────────────────────────── */

      #settings-view {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-group label {
        font-size: 12px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .field-group input,
      .field-group select,
      .field-group textarea {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        width: 100%;
      }

      .field-group input:focus,
      .field-group select:focus,
      .field-group textarea:focus {
        border-color: #0070f3;
      }

      .field-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .model-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .model-row select {
        flex: 1;
      }

      #refreshModels {
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      #saveSettings {
        padding: 8px 14px;
        background: #0070f3;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        align-self: flex-start;
      }

      #settings-status {
        font-size: 12px;
        color: #080;
        min-height: 16px;
      }

      #localhost-warning {
        font-size: 12px;
        color: #b60;
        background: #fffbe6;
        border: 1px solid #ffe066;
        border-radius: 4px;
        padding: 6px 10px;
      }

      #obsidian-warning {
        font-size: 12px;
        color: #b60;
        background: #fffbe6;
        border: 1px solid #ffe066;
        border-radius: 4px;
        padding: 6px 10px;
      }

      .obsidian-path-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .obsidian-path-row input {
        flex: 1;
      }

      .obsidian-path-row button {
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      .obsidian-path-row button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      #obsidian-status {
        font-size: 12px;
        color: #080;
        min-height: 16px;
      }

      .obsidian-test-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .obsidian-test-row button {
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #f5f5f5;
        cursor: pointer;
        font-size: 13px;
      }

      .obsidian-test-row button:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <header>
      <button id="chat-tab" class="tab-btn active">Chat</button>
      <button id="settings-tab" class="tab-btn">Settings</button>
      <button id="new-conversation">New conversation</button>
    </header>

    <div id="chat-view">
      <div id="messages"></div>
      <div id="input-row">
        <textarea id="input" rows="1" placeholder="Message…"></textarea>
        <button id="send">Send</button>
        <button id="stop" hidden>Stop</button>
      </div>
    </div>

    <div id="settings-view" hidden>
      <div class="field-group">
        <label for="baseUrl">Ollama base URL</label>
        <input id="baseUrl" type="url" placeholder="http://localhost:11434" />
      </div>

      <div class="field-group">
        <label>Model</label>
        <div class="model-row">
          <select id="model"></select>
          <button id="refreshModels">Refresh</button>
        </div>
      </div>

      <div class="field-group">
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt"></textarea>
      </div>

      <hr style="border: none; border-top: 1px solid #e5e5e5; margin: 4px 0" />

      <fieldset
        id="obsidian-section"
        style="
          border: 1px solid #e5e5e5;
          border-radius: 6px;
          padding: 12px;
          display: flex;
          flex-direction: column;
          gap: 10px;
        "
      >
        <legend
          style="
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0 4px;
          "
        >
          Obsidian
        </legend>

        <div class="field-group">
          <label for="sp-obsidian-host">Host</label>
          <input id="sp-obsidian-host" type="text" placeholder="localhost" />
        </div>

        <div class="field-group">
          <label for="sp-obsidian-port">Port</label>
          <input id="sp-obsidian-port" type="number" min="1" max="65535" placeholder="27123" />
        </div>

        <div class="field-group">
          <label for="sp-obsidian-api-key">API key</label>
          <input id="sp-obsidian-api-key" type="password" placeholder="Paste your API key" />
        </div>

        <div class="obsidian-test-row">
          <button id="sp-obsidian-test" type="button" disabled>Test connection</button>
          <div id="obsidian-status"></div>
        </div>

        <div class="field-group">
          <label for="sp-obsidian-profile-path">Profile document</label>
          <div class="obsidian-path-row">
            <input
              id="sp-obsidian-profile-path"
              type="text"
              placeholder="Vault/Profile.md"
              list="sidepanel-vault-files"
            />
            <button id="sp-obsidian-browse-profile" type="button" disabled>Browse</button>
          </div>
        </div>

        <div class="field-group">
          <label for="sp-obsidian-system-prompt-path">System prompt document</label>
          <div class="obsidian-path-row">
            <input
              id="sp-obsidian-system-prompt-path"
              type="text"
              placeholder="Vault/SystemPrompt.md"
              list="sidepanel-vault-files"
            />
            <button id="sp-obsidian-browse-system-prompt" type="button" disabled>Browse</button>
          </div>
        </div>

        <datalist id="sidepanel-vault-files"></datalist>
      </fieldset>

      <div id="obsidian-warning" hidden>Obsidian unreachable — using local fallback</div>

      <hr style="border: none; border-top: 1px solid #e5e5e5; margin: 4px 0" />

      <div id="profile-fields" style="display: flex; flex-direction: column; gap: 10px">
        <div class="field-group">
          <label>First name</label>
          <input data-profile="firstName" type="text" />
        </div>
        <div class="field-group">
          <label>Last name</label>
          <input data-profile="lastName" type="text" />
        </div>
        <div class="field-group">
          <label>Email</label>
          <input data-profile="email" type="email" />
        </div>
        <div class="field-group">
          <label>Phone</label>
          <input data-profile="phone" type="tel" />
        </div>
        <div class="field-group">
          <label>Address</label>
          <input data-profile="addressLine1" type="text" />
        </div>
        <div class="field-group">
          <label>City</label>
          <input data-profile="city" type="text" />
        </div>
        <div class="field-group">
          <label>State / Region</label>
          <input data-profile="state" type="text" />
        </div>
        <div class="field-group">
          <label>Postal code</label>
          <input data-profile="postalCode" type="text" />
        </div>
        <div class="field-group">
          <label>Country</label>
          <input data-profile="country" type="text" />
        </div>
      </div>

      <button id="saveSettings">Save settings</button>
      <div id="settings-status"></div>
      <div id="localhost-warning" hidden>
        Warning: base URL is not localhost. All Ollama traffic will leave this machine.
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
